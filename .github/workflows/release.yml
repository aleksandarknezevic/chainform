name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    test:
        name: Go Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: true

            - name: Run tests
              run: go test ./...

    build:
        name: Build binaries
        runs-on: ubuntu-latest
        needs: test
        strategy:
            fail-fast: false
            matrix:
                include:
                    - goos: linux
                      goarch: amd64
                    - goos: linux
                      goarch: arm64
                    - goos: darwin
                      goarch: amd64
                    - goos: darwin
                      goarch: arm64
                    - goos: windows
                      goarch: amd64

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version-file: go.mod
                  cache: true

            - name: Build binary
              env:
                  GOOS: ${{ matrix.goos }}
                  GOARCH: ${{ matrix.goarch }}
                  CGO_ENABLED: "0"
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  EXT=""
                  if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
                  BIN_NAME="chainform_${VERSION}_${GOOS}_${GOARCH}${EXT}"
                  mkdir -p dist
                  go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "dist/${BIN_NAME}" ./cmd/chainform

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: bins-${{ matrix.goos }}-${{ matrix.goarch }}
                  path: dist/*

    release:
        name: Publish GitHub Release
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  merge-multiple: true

            - name: Generate checksums
              run: |
                  cd dist
                  sha256sum * > SHA256SUMS

            - name: Publish release assets
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/*
